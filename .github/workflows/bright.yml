name: Bright

on:
  pull_request:
    branches:
      - '**'

permissions:
  checks: write
  contents: read
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure .env is present
        run: |
          if [ ! -f .env ]; then
            echo ".env file is missing" >&2
            exit 1
          fi

      - name: Start application
        run: |
          docker compose --file=compose.local.yml up --wait
        env:
          URL: "https://brokencrystals.com"
          DATABASE_HOST: db
          DATABASE_SCHEMA: bc
          DATABASE_USER: bc
          DATABASE_PASSWORD: bc
          DATABASE_PORT: '5432'
          DATABASE_DEBUG: 'true'
          AWS_BUCKET: "https://neuralegion-open-bucket.s3.amazonaws.com"
          GOOGLE_MAPS_API: "AIzaSyD2wIxpYCuNI0Zjt8kChs2hLTS5abVQfRQ"
          JWT_PRIVATE_KEY_LOCATION: config/keys/jwtRS256.key
          JWT_PUBLIC_KEY_LOCATION: config/keys/jwtRS256.key.pub.pem
          JWT_SECRET_KEY: '1234'
          JWK_PRIVATE_KEY_LOCATION: config/keys/jwk.key.pem
          JWK_PUBLIC_KEY_LOCATION: config/keys/jwk.pub.key.pem
          JWK_PUBLIC_JSON: config/keys/jwk.pub.json
          JKU_URL: "https://raw.githubusercontent.com/NeuraLegion/brokencrystals/stable/config/keys/jku.json"
          X5U_URL: "https://raw.githubusercontent.com/NeuraLegion/brokencrystals/stable/config/keys/x509.crt"
          FASTIFY_LOGGER: 'true'
          FASTIFY_LOG_LEVEL: warn
          GRPC_WEB_PROXY_URL: http://grpcwebproxy:8081
          KEYCLOAK_SERVER_URI: http://keycloak:8080
          KEYCLOAK_REALM: brokencrystals
          KEYCLOAK_ADMIN_CLIENT_ID: admin-cli
          KEYCLOAK_ADMIN_CLIENT_SECRET: 3abff4a7-6649-4bae-a105-9bd1fb52a2cd
          KEYCLOAK_PUBLIC_CLIENT_ID: brokencrystals-client
          KEYCLOAK_PUBLIC_CLIENT_SECRET: 4bfb5df6-4647-46dd-bad1-c8b8ffd7caf4
          BRIGHT_CLUSTER: app.brightsec.com
          SEC_TESTER_TARGET: http://localhost:3000
          CHAT_API_URL: http://ollama:11434/v1/chat/completions
          CHAT_API_MODEL: smollm:135m
          CHAT_API_MAX_TOKENS: '200'

      - name: Probe application readiness
        run: |
          i=1; while [ "$i" -le 30 ]; do curl -sS -o /dev/null http://127.0.0.1:3000 && exit 0; sleep 5; i=$((i + 1)); done; exit 1

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install SecTesterJS dependencies
        run: |
          npm i --save=false --prefix .brightsec @sectester/core@0.50.0 @sectester/repeater@0.50.0 @sectester/scan@0.50.0 @sectester/runner@0.50.0 @sectester/reporter@0.50.0

      - id: configure
        name: Configure Bright credentials
        run: |
          set -euo pipefail
          # Request an OIDC token from GitHub with an audience matching Bright
          # The ACTIONS_ID_TOKEN_REQUEST_TOKEN must be supplied as a Bearer header
          OIDC_RESPONSE=$(curl -sS -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${ACTIONS_ID_TOKEN_REQUEST_URL}?audience=${BRIGHT_HOSTNAME}")
          OIDC_TOKEN=$(printf "%s" "$OIDC_RESPONSE" | jq -r '.value // empty')
          if [ -z "$OIDC_TOKEN" ]; then
            echo "Error: failed to retrieve OIDC token: $OIDC_RESPONSE" 1>&2
            exit 1
          fi

          # Exchange the OIDC token for a Bright API key
          RESPONSE=$(curl -s -X POST "https://${BRIGHT_HOSTNAME}/api/v1/projects/${BRIGHT_PROJECT_ID}/api-keys/oidc" \
            -H "Content-Type: application/json" \
            -d "{\"token\": \"${OIDC_TOKEN}\"}")

          if ! printf "%s" "$RESPONSE" | jq -e . > /dev/null 2>&1; then
            echo "Error: $RESPONSE" 1>&2
            exit 1
          fi

          PURE_KEY=$(printf "%s" "$RESPONSE" | jq -r '.pureKey')
          if [ -z "$PURE_KEY" ] || [ "$PURE_KEY" = "null" ]; then
            echo "Error: bright returned no pureKey: $RESPONSE" 1>&2
            exit 1
          fi

          echo "::add-mask::$PURE_KEY"
          echo "BRIGHT_TOKEN=$PURE_KEY" >> $GITHUB_ENV
        env:
          BRIGHT_HOSTNAME: development.playground.brightsec.com
          BRIGHT_PROJECT_ID: mh9A1uJecBfTQGKbdK7Ykj

      - name: Run SecTesterJS tests
        env:
          BRIGHT_HOSTNAME: development.playground.brightsec.com
          BRIGHT_PROJECT_ID: mh9A1uJecBfTQGKbdK7Ykj
          BRIGHT_AUTH_ID: ${{ steps.configure.outputs.auth_id }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRIGHT_TOKEN: ${{ env.BRIGHT_TOKEN }}
          BRIGHT_TARGET_URL: http://127.0.0.1:3000
          SECTESTER_SCAN_POOL_SIZE: ${{ vars.SECTESTER_SCAN_POOL_SIZE }}
        run: |
          node --experimental-transform-types --experimental-strip-types --experimental-detect-module --disable-warning=MODULE_TYPELESS_PACKAGE_JSON --disable-warning=ExperimentalWarning --test-force-exit --test-concurrency=4 --test .brightsec/tests/*.test.ts
